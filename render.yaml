services:
  - type: worker
    name: telegram-keyword-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: SESSION_STRING
        sync: false
      - key: MONGO_URI
        sync: false
      - key: CONTROL_GROUP_ID
        sync: false